name: steply
description: Steply - veilig wandelen door Rotterdam voor ouderen
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  flutter_blue_plus: ^1.31.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  provider: ^6.1.2
  http: ^1.2.0
  flutter_svg: ^2.0.10
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/data/
    - assets/images/
